<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miscord</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #313338; color: #dbdee1; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        #user-list { padding: 20px; flex-grow: 1; }
        .user-item { padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: default; }
        .user-item:hover { background-color: #35373c; }
        #chat-container { flex-grow: 1; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { background-color: #383a40; padding: 10px; border-radius: 8px; max-width: 80%; }
        .message-info { font-size: 0.8em; color: #949ba4; margin-bottom: 4px; }
        .message-user { font-weight: bold; color: #ffffff; margin-right: 8px; }
        #input-area { padding: 20px; background-color: #313338; }
        #message-input { width: 100%; padding: 12px; border-radius: 8px; border: none; background-color: #383a40; color: #dcdee1; outline: none; box-sizing: border-box; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #313338; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: #2b2d31; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input[type="text"] { padding: 10px; border-radius: 4px; border: none; margin-bottom: 15px; width: 200px; }
        button { padding: 10px 20px; background: #5865f2; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #4752c4; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Welcome to Miscord</h2>
            <input type="text" id="username-input" placeholder="Enter Username..." maxlength="15">
            <br>
            <button onclick="joinChat()">Join Chat</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #1e1f22;">Online Users</div>
        <div id="user-list"></div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Message #general" onkeypress="handleKey(event)">
        </div>
    </div>

    <script>
        const socket = io(); // Automatic detection for Render/HTTPS

        function joinChat() {
            const name = document.getElementById('username-input').value;
            if (name.trim()) {
                socket.emit('join', name);
                document.getElementById('login-overlay').style.display = 'none';
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('message-input');
                if (input.value.trim()) {
                    socket.emit('message', input.value);
                    input.value = '';
                }
            }
        }

        socket.on('message', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="message-info">
                    <span class="message-user">${data.user}</span>
                    <span>${data.time}</span>
                </div>
                <div>${data.text}</div>
            `;
            const messages = document.getElementById('messages');
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        });

        socket.on('userList', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = users.map(user => `<div class="user-item">● ${user}</div>`).join('');
        });
    </script>
</body>
</html>
